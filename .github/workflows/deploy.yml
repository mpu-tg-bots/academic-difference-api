name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to build (default: latest)'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Generate image tag
        id: tag
        run: |
          echo "IMAGE_TAG=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set up SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Ansible
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Create dynamic inventory file
        run: |
          echo "[vps]" > inventory.ini
          echo "${{ secrets.VPS_IP }}" >> inventory.ini

      - name: Build Docker image and export as .tar.gz
        run: |
          docker buildx build --platform linux/amd64 --load -f ./infra/Dockerfile -t academic-api:$IMAGE_TAG .
          mkdir -p build
          docker save academic-api:$(IMAGE_TAG) | gzip > build/academic-api.tar.gz

      - name: Run Ansible Playbook
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook infra/ansible/playbook.yml \
          -i inventory.ini \
          --private-key private_key.pem \
          -u ${{ secrets.ANSIBLE_USER }} \
          --extra-vars "
            image_tag='$(date +%Y%m%d)-$(git rev-parse --short HEAD)'
            DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            ALLOWED_HOSTS='${{ secrets.ALLOWED_HOSTS }}'
          " \
          --vault-password-file <(echo "$ANSIBLE_VAULT_PASSWORD")
