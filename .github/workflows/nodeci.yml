name: Node.js CI Pipeline

on:
  push:
    branches: ["trunk"]
  pull_request:
    branches: ["trunk"]

jobs:
  lint-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tgbot/package-lock.json

      - name: Install dependencies
        run: cd tgbot && npm ci

      - name: Run linters (ESLint, Prettier)
        run: cd tgbot && npm run lint

      - name: Build project
        run: cd tgbot && npm run build

      - name: Run tests (Jest)
        run: cd tgbot && npm run test
