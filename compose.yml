services:
  postgres:
    image: postgres:18-alpine
    container_name: academic-db-dev
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  academic-api:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
    container_name: academic-api-app-dev
    command: |
      sh -c "python manage.py migrate --noinput
             python manage.py auto_createsuperuser --username=${DJANGO_SUPERUSER_USERNAME} --email=${DJANGO_SUPERUSER_EMAIL} --password=${DJANGO_SUPERUSER_PASSWORD}
             python manage.py auto_createtgbotuser
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/opt/app

volumes:
  staticfiles:
  postgres_data:
